name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Dependencies
        run: npm install
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Apply Compatibility Fixes
        run: |
          cd android
          # تحديث الـ Gradle Wrapper
          sed -i 's/gradle-8.7-all.zip/gradle-8.11.1-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          # تحديث الـ Android Gradle Plugin في ملف build.gradle الرئيسي
          sed -i 's/8.3.2/8.9.1/g' build.gradle
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
