kind = "web"
previewPath = "/"
title = "Diyala Health Map"
version = "1.0.0"
id = "artifacts/diyala-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20737

[services.development]
run = "pnpm --filter @workspace/diyala-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diyala-map", "run", "build" ]
publicDir = "artifacts/diyala-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20737"
BASE_PATH = "/"
